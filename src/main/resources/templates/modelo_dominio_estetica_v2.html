<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modelo de Dominio — Estética Médica MVP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #ffffff;
    color: #111111;
    min-height: 100vh;
    padding: 2rem;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 500;
    color: #111111;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    font-size: 0.9rem;
    color: #555555;
    margin-bottom: 2rem;
  }
  #erd {
    background: #fafafa;
    border-radius: 12px;
    padding: 2rem;
    overflow-x: auto;
    border: 1px solid #e0e0e0;
  }
</style>
</head>
<body>
<h1>Modelo de dominio — Estética médica MVP v2</h1>
<p class="subtitle">Tomás Coronel · Sistema multi-tenant · Historia clínica corporal definida</p>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
  themeVariables: {
    darkMode: false,
    fontSize: '13px',
    fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
    lineColor: '#444444',
    textColor: '#111111',
    primaryColor: '#dbeafe',
    primaryTextColor: '#111111',
    primaryBorderColor: '#3b82f6',
    secondaryColor: '#f1f5f9',
    tertiaryColor: '#f8fafc',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  PROFESIONAL ||--o{ PACIENTE : tiene
  PROFESIONAL ||--o{ SERVICIO : ofrece
  PROFESIONAL ||--o{ TURNO : agenda
  PROFESIONAL ||--o{ BLOQUEO_AGENDA : bloquea
  PACIENTE ||--o| HISTORIA_CLINICA_FACIAL : tiene
  PACIENTE ||--o| HISTORIA_CLINICA_CORPORAL : tiene
  PACIENTE ||--o{ TURNO : asiste
  PACIENTE ||--o{ FOTO_PACIENTE : registra
  TURNO ||--o{ TURNO_SERVICIO : incluye
  SERVICIO ||--o{ TURNO_SERVICIO : usado_en
  TURNO ||--o| SESION_CLINICA : genera
  TURNO ||--o{ PAGO : recibe
  SESION_CLINICA ||--o{ FOTO_PACIENTE : documenta

  PROFESIONAL {
    uuid id PK
    string nombre
    string apellido
    string email
    string telefono
    string especialidad
  }
  PACIENTE {
    uuid id PK
    uuid profesional_id FK
    string nombre
    string apellido
    string dni_cuit
    date fecha_nacimiento
    string telefono
    string email
    string profesion
    string domicilio
    string obra_social
    string numero_obra_social
    string contacto_emergencia_nombre
    string contacto_emergencia_telefono
    string contacto_emergencia_parentesco
    string entidad_traslado_1
    string entidad_traslado_2
  }
  HISTORIA_CLINICA_FACIAL {
    uuid id PK
    uuid paciente_id FK
    json antecedentes_patologicos
    json antecedentes_toxicos
    json antecedentes_alergicos
    text antecedentes_quirurgicos
    text antecedentes_ginecologicos
    boolean herpes_labial
    text medicacion_habitual
    boolean aspirina_ultima_semana
    json habitos
    text examen
    text diagnostico_tratamiento
    text observaciones
    int fototipo_fitzpatrick
    int grado_glogau
    boolean se_toma_fotografia
  }
  HISTORIA_CLINICA_CORPORAL {
    uuid id PK
    uuid paciente_id FK
    json antecedentes_patologicos
    json antecedentes_toxicos
    json antecedentes_alergicos
    text antecedentes_quirurgicos
    text antecedentes_ginecologicos
    boolean herpes_labial
    text medicacion_habitual
    boolean aspirina_ultima_semana
    json habitos_corporales
    json examen_corporal
    decimal peso_actual
    decimal peso_habitual
    decimal imc
    decimal perimetro_cintura
    boolean se_toma_fotografia
    text diagnostico_tratamiento
    text observaciones
  }
  SERVICIO {
    uuid id PK
    uuid profesional_id FK
    string nombre
    string descripcion
    decimal precio
    boolean activo
  }
  TURNO {
    uuid id PK
    uuid profesional_id FK
    uuid paciente_id FK
    datetime fecha_hora
    string estado
    decimal monto_total
  }
  TURNO_SERVICIO {
    uuid id PK
    uuid turno_id FK
    uuid servicio_id FK
    decimal precio_momento
  }
  SESION_CLINICA {
    uuid id PK
    uuid turno_id FK
    int numero_sesion
    text tratamiento
    text respuesta_tolerancia
  }
  FOTO_PACIENTE {
    uuid id PK
    uuid paciente_id FK
    uuid sesion_clinica_id FK
    string ruta_imagen
    datetime fecha
    text descripcion
  }
  PAGO {
    uuid id PK
    uuid turno_id FK
    string metodo
    decimal monto
    boolean es_sena
    boolean es_trueque
    text detalle_trueque
    datetime fecha
  }
  BLOQUEO_AGENDA {
    uuid id PK
    uuid profesional_id FK
    date fecha_inicio
    date fecha_fin
    string motivo
  }
`);
document.getElementById('erd').innerHTML = svg;
</script>
</body>
</html>
